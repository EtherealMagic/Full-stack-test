<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="icon" type="image/ico" href="icon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="posterior" 
    class="contenedor oculto">
        <h1>Bienvenido!</h1>
        <div id="usuario"></div>
        <table id="tablaUsuarios">
            <tr>
                <th>Usuarios</th>
            </tr>
            <tr id="ancla"></tr>
        </table>
        <div class="botones">
            <button id="btnCerrarSesion">
                <p>cerrar sesión</p>
            </button>
        </div>        
    </div>
    
    <div id= "previo" class="contenedor">

        <h1>Iniciar sesión</h1>

        <div class="campo">
            <label for="nombre">Nombre</label>
            <input
                type="text"
                id="nombre"
                placeholder="Ingrese su nombre">
        </div>

        <div class="campo">
            <label for="password">Contraseña</label>
            <input
                type="password"
                id="password"
                placeholder="Ingrese su contraseña">
        </div>

        <div class="botones">
            <button id="btnRegistrar">
                Registrar
            </button>

            <button id="btnLogin">
                Iniciar sesión
            </button>
        </div>

        
        <div id="mensaje"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
